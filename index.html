<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Dashboard Pro | imad zayd</title>
</head>
<body>
    <div class="menu">
        <ul>
            <li class="profile">
                <div class="img-box">
                    <img src="https://ui-avatars.com/api/?name=Imad+Zayd&background=0481ff&color=fff&size=128" alt="profile">
                </div>
                <h2>imad zayd</h2>
            </li>
            <li>
                <a class="active" href="#" data-page="dashboard">
                    <i class="fas fa-home"></i>
                    <p>dashboard</p>
                </a>
            </li>
            <li>
                <a href="#" data-page="products">
                    <i class="fas fa-box"></i>
                    <p>products</p>
                </a>
            </li>
            <li>
                <a href="#" data-page="clients">
                    <i class="fas fa-user-group"></i>
                    <p>clients</p>
                </a>
            </li>
            <li>
                <a href="#" data-page="orders">
                    <i class="fas fa-shopping-cart"></i>
                    <p>orders</p>
                </a>
            </li>
            <li>
                <a href="#" data-page="analytics">
                    <i class="fas fa-chart-pie"></i>
                    <p>analytics</p>
                </a>
            </li>
            <li>
                <a href="#" data-page="settings">
                    <i class="fas fa-cog"></i>
                    <p>settings</p>
                </a>
            </li>
            <li class="log-out">
                <a href="#" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <p>Log out</p>
                </a>
            </li>
        </ul>
    </div>

    <div class="content">
        <div id="mainContent"></div>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-box"></i> <span id="modalTitle">Add New Product</span></h2>
                <span class="close">&times;</span>
            </div>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Product Name</label>
                    <input type="text" id="productName" placeholder="Enter product name" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-dollar-sign"></i> Price ($)</label>
                    <input type="number" id="productPrice" placeholder="0.00" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-sort-numeric-up"></i> Quantity</label>
                    <input type="number" id="productCount" placeholder="0" min="0" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-list"></i> Category</label>
                    <select id="productCategory" required>
                        <option value="">Select category</option>
                        <option value="electronics">Electronics</option>
                        <option value="clothing">Clothing</option>
                        <option value="food">Food</option>
                        <option value="books">Books</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h2><i class="fas fa-exclamation-triangle" style="color: #dc3545;"></i> Confirm Delete</h2>
                <span class="close">&times;</span>
            </div>
            <div class="delete-content">
                <p>Are you sure you want to delete this product?</p>
                <p class="text-warning">This action cannot be undone!</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <!-- Client Modal -->
    <div id="clientModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-user"></i> <span>Add New Client</span></h2>
                <span class="close">&times;</span>
            </div>
            <form id="clientForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Client Name</label>
                    <input type="text" id="clientName" placeholder="Enter client name" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="clientEmail" placeholder="client@example.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone</label>
                    <input type="tel" id="clientPhone" placeholder="+1 234 567 890" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeClientModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Client</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Operation successful!</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
